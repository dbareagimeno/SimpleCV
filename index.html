<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diego Barea Gimeno - CV</title>

    <!-- Tipografia editorial -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">

    <!-- Marked.js para parsear Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        /* Reset y variables */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --text-primary: #1a1a1a;
            --text-secondary: #525252;
            --text-tertiary: #737373;
            --bg-page: #fafafa;
            --bg-subtle: #f5f5f5;
            --border-color: #e5e5e5;
        }

        body {
            font-family: 'Bricolage Grotesque', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.7;
            color: var(--text-primary);
            background: var(--bg-page);
            max-width: 840px;
            margin: 0 auto;
            padding: 72px 20px 56px;
        }

        /* Contenedor principal — sin card */
        #cv-container {
            padding: 0;
        }

        /* Encabezado */
        h1 {
            font-family: 'Playfair Display', Georgia, 'Times New Roman', serif;
            font-size: 3.2em;
            font-weight: 900;
            color: var(--text-primary);
            margin-bottom: 10px;
            letter-spacing: -1.5px;
        }

        h1 + p strong {
            color: var(--text-secondary);
            font-size: 1.1em;
            font-weight: 500;
        }

        /* Secciones */
        h2 {
            font-size: 1.7em;
            font-weight: 700;
            color: var(--text-primary);
            margin-top: 48px;
            margin-bottom: 20px;
            padding-bottom: 0;
        }

        /* Spacing variado para h2 sucesivos — romper perfeccion matematica */
        h2:nth-of-type(2) { margin-top: 32px; }
        h2:nth-of-type(3) { margin-top: 48px; }
        h2:nth-of-type(4) { margin-top: 52px; }
        h2:nth-of-type(5) { margin-top: 50px; }
        h2:nth-of-type(6) { margin-top: 54px; }
        h2:nth-of-type(7) { margin-top: 38px; }

        h3 {
            font-size: 1.15em;
            font-weight: 700;
            color: var(--text-primary);
            margin-top: 25px;
            margin-bottom: 6px;
        }

        /* Parrafos y listas */
        p {
            margin-bottom: 16px;
            color: var(--text-secondary);
        }

        ul {
            margin-left: 20px;
            margin-bottom: 18px;
        }

        li {
            margin-bottom: 7px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* Enlaces — texto primario con underline sutil */
        a {
            color: var(--text-primary);
            text-decoration: underline;
            text-decoration-color: var(--border-color);
            text-underline-offset: 3px;
            transition: text-decoration-color 0.2s;
        }

        a:hover {
            text-decoration-color: var(--text-secondary);
        }

        /* Separadores — linea corta charcoal */
        hr {
            border: none;
            width: 64px;
            height: 2px;
            background: var(--text-primary);
            margin: 38px 0 32px;
        }

        /* Informacion de contacto — flex inline con separadores · */
        h2:first-of-type + ul {
            list-style: none;
            margin-left: 0;
            display: flex;
            flex-wrap: wrap;
            gap: 4px 0;
            padding: 0;
        }

        h2:first-of-type + ul li {
            color: var(--text-primary);
            margin-bottom: 0;
        }

        h2:first-of-type + ul li:not(:last-child)::after {
            content: ' · ';
            color: var(--text-tertiary);
            margin: 0 12px;
        }

        /* Experiencia — empresa gris, fechas italica sin pill */
        h3 + p strong:first-child {
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 1em;
        }

        h3 + p em {
            color: var(--text-tertiary);
            font-style: italic;
            font-size: 0.9em;
        }

        /* Sobre mi */
        h2:nth-of-type(2) + p {
            font-size: 1.05em;
            line-height: 1.8;
            color: var(--text-primary);
        }

        /* Skills — grid con dash, sin pills */
        .skills-section {
            list-style: none;
            margin-left: 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px 32px;
        }

        .skills-section li {
            color: var(--text-secondary);
            margin-bottom: 0;
            padding-left: 18px;
            position: relative;
        }

        .skills-section li::before {
            content: '–';
            position: absolute;
            left: 0;
            color: var(--text-tertiary);
        }

        /* Areas de interes */
        p + ul li {
            position: relative;
            padding-left: 5px;
        }

        /* Loading state */
        #loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        /* Boton de descarga — texto underline sutil */
        .download-btn {
            position: fixed;
            top: 24px;
            right: 24px;
            background: none;
            color: var(--text-secondary);
            padding: 0;
            border-radius: 0;
            cursor: pointer;
            font-family: 'Bricolage Grotesque', sans-serif;
            font-weight: 500;
            font-size: 14px;
            border: none;
            box-shadow: none;
            text-decoration: underline;
            text-decoration-color: var(--border-color);
            text-underline-offset: 3px;
            transition: text-decoration-color 0.2s, color 0.2s;
        }

        .download-btn:hover {
            color: var(--text-primary);
            text-decoration-color: var(--text-secondary);
        }

        /* Print styles - AGGRESSIVE spacing reduction for 1.5 page target */
        @media print {
            body {
                padding: 0;
                max-width: 100%;
                background: white;
                line-height: 1.2; /* AGGRESSIVE: 1.4 → 1.2 (~17% reduction) */
            }

            h1 {
                font-size: 2.2em; /* REDUCED: 2.4em → 2.2em (smaller header) */
                margin-bottom: 6px; /* NEW: add spacing control */
            }

            h2 {
                font-size: 1.2em; /* ULTRA-AGGRESSIVE: 1.3em → 1.2em (better density) */
                page-break-before: avoid; /* NEW: prevent orphaned h2 at bottom of page */
                page-break-after: avoid;
                break-before: avoid; /* NEW: modern alternative for better support */
                break-after: avoid; /* NEW: modern alternative for better support */
                margin-top: 4px; /* ULTRA-AGGRESSIVE: 10px → 4px (60% reduction) */
                margin-bottom: 4px; /* ULTRA-AGGRESSIVE: 6px → 4px (33% reduction) */
            }

            h3 {
                font-size: 1em;
                page-break-after: avoid;
                margin-top: 6px; /* ULTRA-AGGRESSIVE: 8px → 6px (25% reduction) */
                margin-bottom: 2px; /* KEEP: already minimal */
            }

            hr {
                margin: 2px 0 2px; /* ULTRA-AGGRESSIVE: 6px 0 4px → 2px 0 2px (nearly eliminate gaps) */
            }

            p {
                margin-bottom: 6px; /* AGGRESSIVE: 10px → 6px (40% reduction) */
            }

            ul {
                margin-bottom: 6px; /* AGGRESSIVE: 12px → 6px (50% reduction) */
            }

            li {
                margin-bottom: 2px; /* AGGRESSIVE: 4px → 2px (50% reduction) */
            }

            h2:nth-of-type(2) + p {
                line-height: 1.3; /* AGGRESSIVE: 1.5 → 1.3 (tighter intro) */
                margin-bottom: 8px; /* OVERRIDE: give intro section slightly more breathing room */
            }

            a {
                color: var(--text-primary);
                text-decoration: none;
            }

            a[href]:after {
                content: none;
            }

            .download-btn {
                display: none;
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            body {
                padding: 32px 16px 40px;
            }

            h1 {
                font-size: 2.4em;
            }

            h2 {
                font-size: 1.5em;
            }

            h2:first-of-type + ul {
                flex-direction: column;
                gap: 6px;
            }

            h2:first-of-type + ul li:not(:last-child)::after {
                content: '';
                margin: 0;
            }

            .skills-section {
                grid-template-columns: 1fr;
            }

            .download-btn {
                position: relative;
                top: 0;
                right: 0;
                display: block;
                margin-bottom: 16px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <button class="download-btn" onclick="window.print()">Descargar PDF</button>

    <div id="cv-container">
        <div id="loading">Cargando CV...</div>
    </div>

    <script>
        async function loadCV() {
            try {
                const response = await fetch('cv.md');
                const markdown = await response.text();

                marked.setOptions({
                    breaks: true,
                    gfm: true
                });

                const html = marked.parse(markdown);
                document.getElementById('cv-container').innerHTML = html;

                const allElements = document.querySelectorAll('#cv-container > *');

                // Marcar listas de skills
                let inSkillsSection = false;
                allElements.forEach(el => {
                    if (el.tagName === 'H2') {
                        inSkillsSection = /competencias|skills|habilidades/i.test(el.textContent);
                    }
                    if (inSkillsSection && el.tagName === 'UL') {
                        el.classList.add('skills-section');
                    }
                });

                // Eliminar emojis de los h2
                document.querySelectorAll('#cv-container h2').forEach(h2 => {
                    h2.textContent = h2.textContent
                        .replace(/[\u{1F300}-\u{1F9FF}\u{2600}-\u{27BF}\u{FE00}-\u{FE0F}\u{200D}\u{1F1E0}-\u{1F1FF}]/gu, '')
                        .trim();
                });

                // Ocultar secciones vacias (h2 sin contenido significativo hasta el siguiente h2)
                const elements = Array.from(document.querySelectorAll('#cv-container > *'));
                const h2Indices = [];
                elements.forEach((el, i) => {
                    if (el.tagName === 'H2') h2Indices.push(i);
                });

                h2Indices.forEach((h2Idx, i) => {
                    const nextH2Idx = i + 1 < h2Indices.length ? h2Indices[i + 1] : elements.length;
                    const sectionElements = elements.slice(h2Idx + 1, nextH2Idx);

                    // Check if section has meaningful content (not just hr elements)
                    const hasContent = sectionElements.some(el => {
                        if (el.tagName === 'HR') return false;
                        const text = el.textContent.trim();
                        return text.length > 0;
                    });

                    if (!hasContent) {
                        // Hide the h2 and all elements until the next h2
                        elements[h2Idx].style.display = 'none';
                        sectionElements.forEach(el => { el.style.display = 'none'; });
                    }
                });

            } catch (error) {
                console.error('Error cargando el CV:', error);
                document.getElementById('cv-container').innerHTML =
                    '<p style="color: red;">Error al cargar el CV. Asegúrate de que cv.md está en el mismo directorio.</p>';
            }
        }

        document.addEventListener('DOMContentLoaded', loadCV);
    </script>
</body>
</html>
